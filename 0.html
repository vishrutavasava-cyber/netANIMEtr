<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otaku Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <h1 class="splash-text">Otaku Hub</h1>
</div>

<header>
  <h1>Otaku Hub</h1>
  <button onclick="toggleTheme()" class="theme-btn">🌙</button>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchItem()">
</div>

<!-- CATEGORY -->
<div class="category-bar">
  <button onclick="showSection('anime')" class="active">Anime</button>
  <button onclick="showSection('movie')">Movie</button>
  <button onclick="showSection('manga')">Manga</button>
  <button onclick="showSection('manhwa')">Manhwa</button>
</div>

<!-- SECTIONS -->
<div id="anime" class="section active-section"></div>
<div id="movie" class="section"></div>
<div id="manga" class="section"></div>
<div id="manhwa" class="section"></div>

<!-- BACKUP -->
<div class="backup-bar">
  <button onclick="exportData()">📤 Backup</button>
  <input type="file" id="importFile" hidden onchange="importData(event)">
  <button onclick="document.getElementById('importFile').click()">📥 Restore</button>
</div>

<!-- FLOAT BUTTON -->
<button class="fab" onclick="openForm()">+</button>

<!-- FORM MODAL -->
<div id="formModal" class="modal">
  <div class="modal-content">
    <h3>Add Item</h3>
    <input type="text" id="titleInput" placeholder="Enter Name">
    <input type="file" id="imageInput" accept="image/*">
    <select id="categoryInput">
      <option value="anime">Anime</option>
      <option value="movie">Movie</option>
      <option value="manga">Manga</option>
      <option value="manhwa">Manhwa</option>
    </select>
    <button onclick="saveItem()">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html><style>* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body { background:#070b1f; color:white; }

/* SPLASH */
#splash {
  position:fixed; inset:0;
  background:linear-gradient(135deg,#ff0055,#ff7a00);
  display:flex; justify-content:center; align-items:center;
  z-index:9999;
  animation:fadeOut 1s ease 2.5s forwards;
}
.splash-text { font-size:36px; animation:zoomIn 1.5s ease; }
@keyframes zoomIn { from{transform:scale(.5);opacity:0;} to{transform:scale(1);opacity:1;} }
@keyframes fadeOut { to{opacity:0;visibility:hidden;} }

/* HEADER */
header {
  padding:30px 20px;
  text-align:center;
  background:linear-gradient(135deg,#ff0055,#ff7a00);
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
  position:relative;
}

.theme-btn {
  position:absolute;
  right:20px; top:20px;
  padding:8px 12px;
  border:none; border-radius:20px;
  cursor:pointer;
}

/* SEARCH */
.search-bar { padding:15px; text-align:center; }
.search-bar input {
  width:80%; padding:10px;
  border-radius:20px; border:none;
}

/* CATEGORY */
.category-bar {
  display:flex; justify-content:center;
  gap:10px; padding:10px;
}
.category-bar button {
  padding:8px 15px;
  border:none; border-radius:20px;
  background:#222; color:white;
  cursor:pointer;
}
.category-bar button.active { background:#ff0055; }

/* SECTION */
.section {
  display:none;
  padding:20px;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}
.active-section { display:grid; }

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  overflow:hidden;
  text-align:center;
  transition:.3s;
}
.card img { width:100%; height:160px; object-fit:cover; }
.card h3 { padding:10px; font-size:16px; }
.card:hover { transform:scale(1.05); }

/* FAB */
.fab {
  position:fixed;
  bottom:80px; right:20px;
  width:60px; height:60px;
  border-radius:50%;
  border:none;
  background:linear-gradient(45deg,#ff0055,#ff7a00);
  color:white; font-size:28px;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.8);
  justify-content:center; align-items:center;
}
.modal-content {
  background:#1a1f3a;
  padding:20px; border-radius:15px;
  width:80%;
}
.modal-content input, select {
  width:100%; margin:8px 0;
  padding:8px; border-radius:8px;
  border:none;
}

/* BACKUP */
.backup-bar { text-align:center; padding:15px; }
.backup-bar button {
  padding:8px 15px;
  margin:5px;
  border:none; border-radius:20px;
  background:#ff0055; color:white;
}

/* NEON MODE */
.neon { background:#000; }
.neon .card { box-shadow:0 0 15px #00ffff; border:1px solid #00ffff; }
.neon .fab { background:#00ffff; }</style><script>let data = JSON.parse(localStorage.getItem("otakuData")) || [];

function saveToStorage(){
  localStorage.setItem("otakuData", JSON.stringify(data));
}

function loadData(){
  document.querySelectorAll(".section").forEach(sec => sec.innerHTML="");

  data.forEach((item,index)=>{
    const section=document.getElementById(item.category);
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${item.image}">
      <h3>${item.title}</h3>
      <button onclick="deleteItem(${index})" style="background:red;border:none;color:white;padding:5px 10px;border-radius:10px;">Delete</button>
    `;
    section.appendChild(card);
  });
}

function openForm(){ document.getElementById("formModal").style.display="flex"; }
function closeForm(){ document.getElementById("formModal").style.display="none"; }

function saveItem(){
  const title=document.getElementById("titleInput").value;
  const file=document.getElementById("imageInput").files[0];
  const category=document.getElementById("categoryInput").value;

  if(!title||!file){ alert("Fill all fields"); return; }

  const reader=new FileReader();
  reader.onload=function(e){
    data.push({title:title,image:e.target.result,category:category});
    saveToStorage();
    loadData();
    closeForm();
  };
  reader.readAsDataURL(file);
}

function deleteItem(index){
  if(confirm("Delete this item?")){
    data.splice(index,1);
    saveToStorage();
    loadData();
  }
}

function showSection(id){
  document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active-section"));
  document.querySelectorAll(".category-bar button").forEach(btn=>btn.classList.remove("active"));
  document.getElementById(id).classList.add("active-section");
  event.target.classList.add("active");
}

function searchItem(){
  const value=document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    const title=card.querySelector("h3").innerText.toLowerCase();
    card.style.display=title.includes(value)?"block":"none";
  });
}

function exportData(){
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="otaku-backup.json";
  a.click();
}

function importData(event){
  const file=event.target.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    data=JSON.parse(e.target.result);
    saveToStorage();
    loadData();
  };
  reader.readAsText(file);
}

function toggleTheme(){
  document.body.classList.toggle("neon");
  localStorage.setItem("theme",document.body.classList.contains("neon")?"neon":"dark");
}

window.onload=function(){
  if(localStorage.getItem("theme")==="neon"){
    document.body.classList.add("neon");
  }
  loadData();
};</script>
